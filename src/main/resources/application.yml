spring:
  application:
    name: ROE

  datasource:
    url: jdbc:postgresql://localhost:5432/roe
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  file:
    name: logs/roe.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/roe.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
